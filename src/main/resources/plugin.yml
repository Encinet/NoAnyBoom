name: NoAnyBoom
version: '1.0'
main: org.encinet.noAnyBoom.NoAnyBoom
api-version: 1.18
authors: [ Noctiro ]

commands:
  nab:
    description: NoAnyBoom admin command
    usage: /nab <list|info <player>|reset <player> [violations|bans|all]>
permissions:
  noanyboom.admin:
    description: Access to /nab command
    default: op
  noanyboom.bypass:
    description: Exempt from violation tracking and bans
    default: false
